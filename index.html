<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
let db = DB.load();
function $(s,r=document){return r.querySelector(s);}
function $$(s,r=document){return [...r.querySelectorAll(s)];}
function tr(k){return I18N.t(k);}
function L(o,f){return o[f+'_'+I18N.current] ?? o[f+'_en'] ?? '';}
function pad(n){return String(n).padStart(2,'0');}

function toast(msg,type=''){
  const el = $('#toast');
  el.className = 'toast show ' + type;
  el.textContent = msg;
  setTimeout(()=>el.classList.remove('show'),3000);
}

// Ticker content
function buildTicker(){
  const c = db.company;
  const items = [
    `${L(c,'name')} · ${L(c,'tagline')}`,
    'ISO 13485 Certified',
    '24/7 Technical Support',
    `${db.products.length} Products in Catalog`,
    `Serving ${db.clients.length}+ Healthcare Institutions`,
    'New: CardioTech monitors now in stock',
    'Free installation in major cities',
  ];
  // Duplicate for seamless scroll
  const html = (items.concat(items)).map(t=>`<span>${t}</span>`).join('');
  $('#tickerTrack').innerHTML = html;
}

function applyI18n(){
  $$('[data-i18n]').forEach(el=>{ el.textContent = tr(el.dataset.i18n); });
  const c = db.company;
  $$('[data-company-name]').forEach(el=>el.textContent = L(c,'name'));
  $$('[data-company-tagline]').forEach(el=>el.textContent = L(c,'tagline'));
  $$('[data-company-address]').forEach(el=>el.textContent = L(c,'address'));
  $$('[data-company-phone]').forEach(el=>el.textContent = c.phone);
  $$('[data-company-email]').forEach(el=>el.textContent = c.email);
  $$('[data-company-hours]').forEach(el=>el.textContent = L(c,'hours'));
  $('#langBtn').textContent = I18N.current === 'en' ? 'العربية' : 'English';
  const fc = $('#footerCats');
  if(fc) fc.innerHTML = db.categories.map(c=>`<li><a href="#/products">${L(c,'name')}</a></li>`).join('');
}

I18N.set(I18N.current);
$('#langBtn').addEventListener('click',()=>{
  I18N.set(I18N.current==='en'?'ar':'en');
  render(); applyI18n(); buildTicker();
});
$('#menuToggle').addEventListener('click',()=>$('#navLinks').classList.toggle('open'));

// Router
const routes = {
  '/'         : viewHome,
  '/about'    : viewAbout,
  '/services' : viewServices,
  '/products' : viewProducts,
  '/clients'  : viewClients,
  '/contact'  : viewContact,
};
function render(){
  db = DB.load();
  buildTicker();
  const hash = location.hash.replace(/^#/,'') || '/';
  const pm = hash.match(/^\/product\/(.+)$/);
  if(pm){ viewProductDetail(pm[1]); afterRender(hash); return; }
  (routes[hash]||viewHome)();
  afterRender(hash);
}
function afterRender(hash){
  $$('.nav-links a').forEach(a=>{
    const h = a.getAttribute('href').replace(/^#/,'');
    a.classList.toggle('active', h === hash || (h==='/'&&hash==='/'));
  });
  $('#navLinks').classList.remove('open');
  applyI18n();
  window.scrollTo({top:0,behavior:'instant'});
}
window.addEventListener('hashchange', render);

// =============================================== HOME — bento
function viewHome(){
  const c = db.company;
  const hp = db.homepage;
  const featured = db.products.filter(p=>p.featured).slice(0,5);
  const services = db.services.slice(0,6);
  const clients = db.clients;
  const heroImg = featured[0]?.image || 'https://images.unsplash.com/photo-1666214280391-8ff5bd3c0bf0?auto=format&fit=crop&w=1200&q=80';

  const heroTitle = L(hp,'hero_title');
  // Wrap a couple words in <em> for the accent serif italic
  const heroHTML = heroTitle.replace(/(\S+\s+\S+)$/, '<em>$1</em>');

  $('#view').innerHTML = `
    <!-- HERO BENTO -->
    <section class="hero">
      <div class="container">
        <div class="bento">

          <!-- main hero -->
          <div class="span-8 row-4 bento-hero">
            <div class="stamp">${I18N.current==='ar' ? 'حلول طبية متكاملة' : 'Medical solutions, end-to-end'}</div>
            <h1>${heroHTML}</h1>
            <div>
              <p>${L(hp,'hero_sub')}</p>
              <div class="actions">
                <a href="#/products" class="btn btn-primary">${L(hp,'hero_cta') || tr('browse')}
                  <span class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
                </a>
                <a href="#/contact" class="btn btn-outline">${tr('request_quote')}</a>
              </div>
            </div>
          </div>

          <!-- hero image -->
          <div class="span-4 row-3 bento-img">
            <img src="${heroImg}" alt="" onerror="this.style.display='none'">
            <div class="overlay">
              <span class="ind">LIVE INVENTORY</span>
              <span>${pad(db.products.length)}/${pad(50)}</span>
            </div>
          </div>

          <!-- iso seal -->
          <div class="span-4 row-1 bento-iso">
            <div class="seal">ISO 13485</div>
            <div class="small">Quality Mgmt for Medical Devices</div>
          </div>

          <!-- 4 stat tiles -->
          ${hp.stats.map((s,i)=>`
            <div class="span-3 row-2 bento-stat">
              <div class="ix">${pad(i+1)}</div>
              <span class="num">${s.v}</span>
              <span class="lbl">${L(s,'l')}</span>
            </div>
          `).join('')}

        </div>
      </div>
    </section>

    <!-- MARQUEE -->
    <div class="marquee">
      <div class="marquee-track">
        <span>
          ${[...db.clients,...db.clients].map(cl=>L(cl,'name')).join('</span><span>')}
        </span>
      </div>
    </div>

    <!-- FEATURED -->
    <section>
      <div class="container">
        <div class="section-meta">
          <div>
            <span class="section-tag">${pad(1)} ${tr('featured_products')}</span>
            <h2>Equipment chosen for <em>precision</em>, built for <em>longevity</em>.</h2>
          </div>
          <div class="right">${I18N.current==='ar' ? 'مختارة بعناية من شركاء عالميين، مع تركيب وتدريب وضمان كامل.' : 'Hand-picked from global manufacturing partners — installed, calibrated, and warranted by us.'}</div>
        </div>
        <div class="editorial-grid">
          ${featured.length ? renderEditorialGrid(featured) : '<div class="span-12 empty">No featured products yet</div>'}
        </div>
        <div style="text-align:center;margin-top:36px;">
          <a href="#/products" class="btn btn-outline">${tr('view_all')} →</a>
        </div>
      </div>
    </section>

    <!-- FIGURES -->
    <section style="padding-top:0;">
      <div class="container">
        <div class="figures">
          ${hp.stats.map(s=>`
            <div>
              <div class="v">${s.v}</div>
              <div class="l">${L(s,'l')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <!-- SERVICES -->
    <section>
      <div class="container">
        <div class="section-meta">
          <div>
            <span class="section-tag">${pad(2)} ${tr('our_services')}</span>
            <h2>Beyond delivery — <em>everything</em> that comes after.</h2>
          </div>
          <div class="right">${I18N.current==='ar' ? 'نحن لسنا موزّعًا، بل شريكك الفنّي طوال عمر الجهاز.' : 'We are not a distributor. We are your engineering partner for the device\'s entire operational life.'}</div>
        </div>
        <div class="svc-list">
          ${services.map((s,i)=>`
            <div class="svc-row">
              <div class="num">${pad(i+1)}.</div>
              <div class="title">${L(s,'title')}</div>
              <div class="desc">${L(s,'desc')}</div>
              <div class="ico">${iconSVG(s.icon)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <!-- CLIENTS -->
    <section style="padding-top:0;">
      <div class="container">
        <div class="section-meta">
          <div>
            <span class="section-tag">${pad(3)} ${tr('clients')}</span>
            <h2>Trusted by <em>${clients.length}+</em> institutions across the region.</h2>
          </div>
          <div class="right"><a href="#/clients" class="btn btn-outline">${tr('view_all')} →</a></div>
        </div>
        <div class="clients-grid">
          ${clients.slice(0,8).map((cl,i)=>`
            <div class="client-cell">
              <span class="ix">${pad(i+1)}/${pad(clients.length)}</span>
              <span class="nm">${L(cl,'name')}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section style="padding-top:0;padding-bottom:0;">
      <div class="container">
        <div class="cta-edit">
          <h2>${I18N.current==='ar' ? 'هل تخطّط لتجهيز <em>قسم جديد</em>؟' : 'Planning a <em>new wing</em> or department?'}</h2>
          <div class="actions">
            <p>${tr('cta_sub')}</p>
            <a href="#/contact" class="btn btn-primary">${tr('request_quote')}
              <span class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
            </a>
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderEditorialGrid(list){
  // Editorial mix: first big, then mix of 4 and 3
  const layouts = ['span-6','span-3','span-3','span-4','span-4','span-4'];
  return list.map((p,i)=>{
    const span = layouts[i] || 'span-4';
    const cat = db.categories.find(c=>c.id===p.categoryId);
    return `
      <a href="#/product/${p.id}" class="e-card ${span}">
        <span class="e-num">${pad(i+1)} / ${pad(list.length)}</span>
        ${cat?`<span class="e-cat">${L(cat,'name')}</span>`:''}
        <div class="e-img"><img src="${p.image}" alt="" loading="lazy" onerror="this.parentNode.style.background='var(--surface-2)';this.style.display='none'"></div>
        <div class="e-body">
          <h3>${L(p,'name')}</h3>
          <p class="desc">${L(p,'desc')}</p>
          <div class="e-foot">
            <span class="e-brand">${p.brand || ''}</span>
            <span class="e-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
          </div>
        </div>
      </a>
    `;
  }).join('');
}

// =============================================== ABOUT

    <div class="page-head">
      <div class="container">
        <div class="crumbs"><a href="#/">${tr('home')}</a> · ${tr('about')}</div>
        <h1>${I18N.current==='ar' ? 'نَبني الثقة <em>منذ 2010</em>.' : 'Building <em>trust</em> since 2010.'}</h1>
        <p class="lede">${L(c,'tagline')}</p>
      </div>
    </div>
    <section>
      <div class="container">
        <div class="about-block">
          <div class="about-img-frame">
            <img src="https://images.unsplash.com/photo-1631815589968-fdb09a223b1e?auto=format&fit=crop&w=900&q=85" alt="Facility" onerror="this.parentNode.style.background='var(--surface-2)';this.style.display='none'">
            <div class="stamp">FACILITY · 2400 m²</div>
          </div>
          <div>
            <span class="section-tag">${pad(1)} Our story</span>
            <h2 class="serif" style="font-size:42px;line-height:1.05;margin:18px 0 24px;">${I18N.current==='ar' ? 'خمسة عشر عامًا في خدمة <em>الرعاية الصحية</em>.' : 'Fifteen years serving <em>healthcare</em>.'}</h2>
            <p style="font-size:17px;color:var(--ink-2);">${L(c,'about')}</p>
            <div class="pull-quote">${I18N.current==='ar' ? '"نحن لا نبيع المعدات — بل نبني <em>شراكات</em> تُعاش لعقود."' : '"We don\'t sell equipment. We build <em>partnerships</em> measured in decades."'}</div>
            <a href="#/contact" class="btn btn-primary">${tr('request_quote')}

    <section style="padding-top:0;">

          <div><div class="v">15</div><div class="l">${I18N.current==='ar'?'سنوات في القطاع':'Years in business'}</div></div>
          <div><div class="v">300+</div><div class="l">${I18N.current==='ar'?'منشأة صحية':'Institutions served'}</div></div>
          <div><div class="v">40+</div><div class="l">${I18N.current==='ar'?'شريك تجاري':'Brand partners'}</div></div>
          <div><div class="v">24/7</div><div class="l">${I18N.current==='ar'?'دعم فني':'Technical support'}</div></div>

    </div>
    <section>

        <div class="svc-list">

              <div class="title">${L(s,'title')}</div>
              <div class="desc">${L(s,'desc')}</div>

            </div>
          `).join('')}
        </div>
      </div>

    <section style="padding-top:0;">
      <div class="container">
        <div class="cta-edit">

// =============================================== PRODUCTS LISTING
let productSearch = '';
let productCat = '';

function viewProducts(){
  $('#view').innerHTML = `
    <div class="page-head">
      <div class="container">
        <div class="crumbs"><a href="#/">${tr('home')}</a> · ${tr('products')}</div>
        <h1>${I18N.current==='ar' ? 'كتالوج <em>المعدات</em>.' : 'The full <em>catalog</em>.'}</h1>
        <p class="lede">${I18N.current==='ar' ? 'تصفّح حسب الفئة أو ابحث عن جهاز محدّد.' : 'Browse by category or search for a specific device.'}</p>
      </div>
    </div>
    <section>
      <div class="container">
        <div class="filter-bar">
          <input type="search" id="prodSearch" class="search-input" placeholder="${tr('search')}" value="${productSearch}">
        </div>
        <div class="chip-row" style="margin-bottom:32px;">
          <button class="chip ${productCat===''?'active':''}" data-cat="">${tr('filter_all')}</button>
          ${db.categories.map(c=>`<button class="chip ${productCat===c.id?'active':''}" data-cat="${c.id}">${L(c,'name')}</button>`).join('')}
        </div>
        <div id="productsList"></div>
      </div>
    </section>
  `;
  renderProductList();
  $('#prodSearch').addEventListener('input', e => { productSearch = e.target.value; renderProductList(); });
  $$('.chip').forEach(b => b.addEventListener('click', () => {
    productCat = b.dataset.cat;
    $$('.chip').forEach(c => c.classList.toggle('active', c.dataset.cat === productCat));
    renderProductList();
  }));
}

function renderProductList(){
  const t = productSearch.trim().toLowerCase();
  const list = db.products.filter(p=>{
    if(productCat && p.categoryId!==productCat) return false;
    if(!t) return true;
    return (p.name_en+' '+p.name_ar+' '+p.sku+' '+p.brand).toLowerCase().includes(t);
  });
  if(list.length===0){
    $('#productsList').innerHTML = `<div class="empty">${tr('no_products')}</div>`;
    return;
  }
  $('#productsList').innerHTML = `<div class="editorial-grid">${list.map((p,i)=>{
    const cat = db.categories.find(c=>c.id===p.categoryId);
    return `
      <a href="#/product/${p.id}" class="e-card span-4">
        <span class="e-num">${pad(i+1)}/${pad(list.length)}</span>
        ${cat?`<span class="e-cat">${L(cat,'name')}</span>`:''}
        <div class="e-img"><img src="${p.image}" alt="" loading="lazy" onerror="this.parentNode.style.background='var(--surface-2)';this.style.display='none'"></div>
        <div class="e-body">
          <h3>${L(p,'name')}</h3>
          <p class="desc">${L(p,'desc')}</p>
          <div class="e-foot">
            <span class="e-brand">${p.brand || ''}</span>
            <span class="e-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
          </div>
        </div>
      </a>
    `;
  }).join('')}</div>`;
}

// =============================================== PRODUCT DETAIL
function viewProductDetail(id){
  const p = db.products.find(x=>x.id===id);
  if(!p){
    $('#view').innerHTML = `<div class="container" style="padding:120px 28px;"><div class="empty">${tr('no_products')}</div></div>`;
    return;
  }
  const cat = db.categories.find(c=>c.id===p.categoryId);
  const specs = p['specs_'+I18N.current] || p.specs_en || [];
  const idx = db.products.findIndex(x=>x.id===id) + 1;

  $('#view').innerHTML = `
    <div class="page-head">
      <div class="container">
        <div class="crumbs"><a href="#/">${tr('home')}</a> · <a href="#/products">${tr('products')}</a> · ${L(p,'name')}</div>
      </div>
    </div>
    <section>
      <div class="container detail-grid">
        <div class="detail-img-wrap">
          <img src="${p.image}" alt="${L(p,'name')}" onerror="this.parentNode.style.background='var(--surface-2)';this.style.display='none'">
          <span class="num-stamp">№ ${pad(idx)} / ${pad(db.products.length)}</span>
        </div>
        <div class="detail-side">
          <div class="cat">${cat?L(cat,'name'):''}</div>
          <h1>${L(p,'name')}</h1>
          <div class="meta">
            <div><div class="k">${tr('brand')}</div><div class="v">${p.brand || '—'}</div></div>
            <div><div class="k">${tr('sku')}</div><div class="v mono">${p.sku || '—'}</div></div>
          </div>
          <p class="desc">"${L(p,'desc')}"</p>
          ${specs.length ? `
            <div class="section-tag" style="margin-bottom:14px;">${tr('specifications')}</div>
            <ul class="spec-list">
              ${specs.map(s=>`<li><span></span><span>${s}</span></li>`).join('')}
            </ul>` : ''}
          <div class="detail-actions">
            <a href="#/contact" class="btn btn-primary">${tr('request_quote')}
              <span class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
            </a>
            <a href="#/products" class="btn btn-outline">← ${tr('back')}</a>
          </div>
        </div>
      </div>
    </section>
  `;
}

        <h1>${I18N.current==='ar' ? 'عملاؤنا — <em>المرجع</em>.' : 'Our clients — <em>the reference</em>.'}</h1>

// =============================================== CONTACT
function viewContact(){
  const c = db.company;
  $('#view').innerHTML = `
    <div class="page-head">
      <div class="container">
        <div class="crumbs"><a href="#/">${tr('home')}</a> · ${tr('contact')}</div>
        <h1>${I18N.current==='ar' ? 'لنبدأ <em>المحادثة</em>.' : 'Let\'s start a <em>conversation</em>.'}</h1>
        <p class="lede">${tr('contact_intro')}</p>
      </div>
    </div>
    <section>
      <div class="container contact-grid">
        <div class="contact-info">
          <div class="contact-block">
            <div class="lbl">${tr('visit_us')}</div>
            <div class="val">${L(c,'address')}</div>
          </div>
          <div class="contact-block">
            <div class="lbl">${tr('call_us')}</div>
            <div class="val"><a href="tel:${c.phone}">${c.phone}</a></div>
          </div>
          <div class="contact-block">
            <div class="lbl">${tr('email_us')}</div>
            <div class="val"><a href="mailto:${c.email}">${c.email}</a></div>
          </div>
          <div class="contact-block">
            <div class="lbl">${tr('working_hours')}</div>
            <div class="val">${L(c,'hours')}</div>
          </div>
        </div>
        <form class="form" id="contactForm">
          <div class="form-row">
            <div class="field"><label>${tr('full_name')}</label><input type="text" name="name" required></div>
            <div class="field"><label>${tr('email')}</label><input type="email" name="email" required></div>
          </div>
          <div class="form-row">
            <div class="field"><label>${tr('phone')}</label><input type="tel" name="phone"></div>
            <div class="field"><label>${tr('subject')}</label><input type="text" name="subject"></div>
          </div>
          <div class="field"><label>${tr('message')}</label><textarea name="message" required></textarea></div>
          <div style="margin-top:14px;">
            <button type="submit" class="btn btn-primary">${tr('send')}
              <span class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></span>
            </button>
          </div>
        </form>
      </div>
    </section>
  `;
  $('#contactForm').addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd.entries());
    db.messages.unshift({ id: DB.uid('m'), ...data, created: new Date().toISOString(), read: false });
    DB.save(db);
    e.target.reset();
    toast(tr('msg_sent'));
  });
}
